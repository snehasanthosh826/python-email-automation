name: Email Automation

on:
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    env:
      EMAIL_PASS: ${{ secrets.__EMAIL_PASS__ }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script
        run: python main.py
